---
## WGDashboard version (always specify exact version for controlled updates)
wgdashboard_version: "v4.3.3"

## Installation directory
wgdashboard_install_dir: /opt/WGDashboard

## WireGuard/AmneziaWG interface (for systemd service dependency and autostart)
## For wireguard backend: set to wireguard_interface value (e.g. wg0)
## For amneziawg backend: set to amneziawg_interface value (e.g. awg0)
wgdashboard_wg_interface: "{{ wireguard_interface | default('wg0') }}"

## VPN backend: wireguard (wg-quick@) or amneziawg (awg-quick@)
wgdashboard_wg_backend: "wireguard"

## Directory where VPN configs and keys are stored
## wireguard:   /etc/wireguard
## amneziawg:   /etc/amnezia/amneziawg
wgdashboard_vpn_config_dir: "{{ '/etc/amnezia/amneziawg' if wgdashboard_wg_backend == 'amneziawg' else '/etc/wireguard' }}"

## Account settings
wgdashboard_admin_user: "admin"

## Admin password hash (bcrypt)
## IMPORTANT: Generate your own hash! Default "admin" is insecure!
## Generate with: htpasswd -B -n -b "" 'your-password' | cut -d: -f2
## Or Python: python3 -c "import bcrypt; print(bcrypt.hashpw(b'your-password', bcrypt.gensalt()).decode())"
## Default hash below is for password "admin" - CHANGE IT!
wgdashboard_admin_pass_hash: ""

## Server settings
wgdashboard_app_ip: "127.0.0.1"
wgdashboard_app_port: 10086
## !!!false in double quote!!!
wgdashboard_welcome_session: "false"
wgdashboard_enable_totp: "false"
wgdashboard_totp_verified: "false"

## Peer defaults
## For amneziawg backend override this with amneziawg_address value:
##   wgdashboard_peer_global_dns: "{{ amneziawg_address | ansible.utils.ipaddr('address') }}"
wgdashboard_peer_global_dns: "{{ wireguard_address | default('10.0.0.1/24') | ansible.utils.ipaddr('address') }}"

wgdashboard_peer_mtu: 1420
wgdashboard_peer_keep_alive: 21

## Endpoint that WGDashboard puts into peer .conf files (Endpoint=...:port).
## Default: ansible_host (public IP from inventory).
## Без этого WGDashboard резолвит через gethostbyname() → попадает на 127.0.1.1
## из стандартной Debian-строки в /etc/hosts → конфиг непригоден для подключения.
wgdashboard_peer_remote_endpoint: "{{ ansible_host }}"

## Allowed IPs that WGDashboard puts into peer .conf files for new peers.
## Default: route ALL traffic through tunnel (full-tunnel VPN).
## Override to e.g. "10.0.0.0/24" if you need split-tunnel.
## Без этого WGDashboard ставит <wg_network>/24 → через туннель идёт только
## трафик к WG-сети, обычный интернет идёт мимо туннеля → VPN де-факто не работает.
wgdashboard_peer_endpoint_allowed_ip: "0.0.0.0/0,::/0"
